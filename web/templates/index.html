<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Prescriber Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      background: #fafafa;
      color: #1a1a1a;
    }
    header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #ddd;
      background: white;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { margin: 0; font-size: 1rem; font-weight: 600; }
    header small { color: #888; }
    header nav { margin-left: auto; }
    header nav a { color: #2d6cdf; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; font-weight: 500; }
    header nav a:hover { text-decoration: underline; }
    main { max-width: 820px; margin: 0 auto; padding: 1rem; }
    #conversation { display: flex; flex-direction: column; gap: 0.75rem; padding-bottom: 5.5rem; }
    .msg { padding: 0.65rem 0.9rem; border-radius: 0.75rem; max-width: 88%; line-height: 1.45; white-space: pre-wrap; }
    .msg.user { background: #2d6cdf; color: white; align-self: flex-end; }
    .msg.bot  { background: white; border: 1px solid #e3e3e3; align-self: flex-start; }
    .msg.tool { background: #f3f0e7; border: 1px solid #e6e0cc; color: #6c5a1f; align-self: flex-start; font-family: ui-monospace, monospace; font-size: 0.8rem; }
    .msg.deny { background: #fdecea; border: 1px solid #f5c2c0; color: #8b1a14; align-self: flex-start; font-family: ui-monospace, monospace; font-size: 0.8rem; padding-left: 0.4rem; border-left: 4px solid #8b1a14; }
    .msg.deny::before { content: "[DENIED] "; font-weight: 700; }
    .msg.error { background: #fdecea; border: 1px solid #f5c2c0; color: #8b1a14; align-self: flex-start; }
    form {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 0.75rem 1rem; background: white; border-top: 1px solid #ddd;
      display: flex; gap: 0.5rem;
    }
    form .inner { max-width: 820px; margin: 0 auto; width: 100%; display: flex; gap: 0.5rem; }
    input[type=text] { flex: 1; padding: 0.55rem 0.75rem; border: 1px solid #ccc; border-radius: 0.5rem; font: inherit; }
    button { padding: 0 1rem; border: 0; border-radius: 0.5rem; background: #2d6cdf; color: white; font: inherit; cursor: pointer; }
    button:disabled { background: #aaa; }
    .htmx-request button { background: #aaa; }
    .htmx-indicator { display: none; color: #888; align-self: center; }
    .htmx-request .htmx-indicator { display: inline; }
  </style>
</head>
<body>
  <header>
    <h1>Prescriber Bot</h1>
    <small>CMS Part D Prescribers · CA · 2023</small>
    <nav>
      <a href="/actions">Actions log</a>
      <a href="/telemetry">Telemetry</a>
      <a href="/lineage">Lineage</a>
      <span id="auth-pill"
            hx-get="/auth/me" hx-trigger="load"
            hx-swap="innerHTML"
            style="margin-left:1rem;color:#666;font-size:0.85rem"></span>
    </nav>
  </header>

  <script>
    // Render the auth pill from /auth/me JSON (HTMX swaps the raw JSON into
    // the span; this re-renders it as a friendly user + logout link).
    document.body.addEventListener('htmx:afterSwap', (e) => {
      if (e.target.id !== 'auth-pill') return;
      try {
        const j = JSON.parse(e.target.textContent.trim());
        if (j.authenticated) {
          const roles = (j.roles || []).join(', ');
          e.target.innerHTML =
            '<strong>' + (j.username || j.name) + '</strong>' +
            (roles ? ' <span style="color:#888">(' + roles + ')</span>' : '') +
            ' · <a href="/auth/logout">logout</a>';
        } else {
          e.target.innerHTML = '<a href="/auth/login">login</a>';
        }
      } catch (err) {
        e.target.textContent = '';   // auth disabled — nothing to render
      }
    });
  </script>

  <main>
    <div id="conversation">
      <div class="msg bot">
        Ask me about California prescribers in the 2023 Medicare Part D data. Try:
        <br>· "Who prescribed Lipitor the most?"
        <br>· "What does cardiology prescribe most often?"
        <br>· "Which specialties cost the most overall?"
      </div>
    </div>

    <form hx-post="/chat"
          hx-target="#conversation"
          hx-swap="beforeend"
          hx-on::after-request="this.reset(); this.message.focus()"
          hx-disabled-elt="button">
      <div class="inner">
        <input type="text" name="message" autocomplete="off" required
               placeholder="Ask a question…" autofocus>
        <span class="htmx-indicator">thinking…</span>
        <button type="submit">Ask</button>
      </div>
    </form>
  </main>
</body>
</html>
