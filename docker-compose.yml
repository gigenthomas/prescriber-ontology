services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ontology}
      POSTGRES_USER: ${POSTGRES_USER:-ontology}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontology}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./docker/volumes/postgres:/var/lib/postgresql/data
      - ./db/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ontology} -d ${POSTGRES_DB:-ontology}"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ontology-dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./docker/volumes/neo4j/data:/data
      - ./docker/volumes/neo4j/logs:/logs
      - ./docker/volumes/neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Auth: Keycloak (OIDC identity provider) ────────────────────────────
  #
  # Dev-mode start uses an internal H2 database — persisted via the volume
  # so users/sessions survive container restarts. Switch to KC_DB=postgres
  # for production. The realm import runs only when the data volume is
  # empty (first boot); to re-import, wipe ./docker/volumes/keycloak.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-keycloak-dev}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8180"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
      - "9000:9000"  # management/health endpoint
    volumes:
      - ./docker/volumes/keycloak:/opt/keycloak/data
      - ./auth/keycloak/realms:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ─── Auth: OPA (Open Policy Agent) ──────────────────────────────────────
  #
  # Loads every .rego file under ./auth/policies at startup. Decision API
  # at POST http://opa:8181/v1/data/<package>/<rule>. Exposed on the host
  # for dev convenience.
  opa:
    image: openpolicyagent/opa:latest
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "--log-level=info"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ./auth/policies:/policies:ro
    healthcheck:
      test: ["CMD", "/opa", "version"]   # OPA image has no curl/wget — `opa version` is the lightest liveness check
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Chatbot (auth + compliance role for MCP) ───────────────────────────
  #
  # The same prescriber-bot binary the user normally runs in PowerShell,
  # packaged as a service that boots with the rest of the stack. Reaches
  # postgres / neo4j / keycloak / opa via the compose network, while still
  # publishing on host port 8081 so the browser can hit it at
  # http://localhost:8081/. AUTH_PROVIDER=keycloak by default; flip this
  # to none and remove the KEYCLOAK_* / OPA_* / MCP_SERVICE_ROLES env if
  # you want anonymous mode.
  #
  # The bot needs ANTHROPIC_API_KEY at runtime — drop it in the host's
  # .env (already gitignored) and compose will pass it through.
  bot:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      neo4j:    { condition: service_healthy }
      keycloak: { condition: service_healthy }
      opa:      { condition: service_healthy }
    environment:
      ADDR: ":8080"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ontology}
      POSTGRES_USER: ${POSTGRES_USER:-ontology}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontology}

      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ontology-dev}

      # Auth (Keycloak + OPA). Discovery URL is compose-internal so the
      # bot can reach Keycloak from inside the network; issuer URL stays
      # browser-facing so JWT iss claims match what Keycloak announces.
      AUTH_PROVIDER: ${AUTH_PROVIDER:-keycloak}
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_ISSUER_URL:-http://localhost:8180/realms/ontology-dev}
      KEYCLOAK_DISCOVERY_URL: ${KEYCLOAK_DISCOVERY_URL:-http://keycloak:8080/realms/ontology-dev}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ontology-web}
      KEYCLOAK_REDIRECT_URL: ${KEYCLOAK_REDIRECT_URL:-http://localhost:8081/auth/callback}
      OPA_URL: http://opa:8181

      # MCP service-account identity used when MCP traffic hits this bot.
      MCP_SERVICE_ROLES: ${MCP_SERVICE_ROLES:-compliance}
      MCP_SERVICE_SUB: ${MCP_SERVICE_SUB:-00000000-0000-0000-0000-00000000mcp1}
      MCP_SERVICE_USERNAME: ${MCP_SERVICE_USERNAME:-mcp-service}
    ports:
      - "${BOT_PORT:-8081}:8080"
    restart: unless-stopped
